<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Trophy icon WC 2026</title>
  <desc>Minimalist FIFA World Cup 2026 trophy icon</desc>

  <!-- background circle -->
  <circle cx="130" cy="130" r="130" fill="#0f1f2e"/>

  <!-- cup body -->
  <path d="M90,60 L170,60 L158,132 Q154,158 130,166 Q106,158 102,132 Z"
        fill="none" stroke="#e8c54a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- handles -->
  <path d="M90,68 Q62,68 62,92 Q62,116 90,120"
        fill="none" stroke="#e8c54a" stroke-width="2"/>
  <path d="M170,68 Q198,68 198,92 Q198,116 170,120"
        fill="none" stroke="#e8c54a" stroke-width="2"/>

  <!-- stem -->
  <line x1="130" y1="166" x2="130" y2="196" stroke="#e8c54a" stroke-width="2.5"/>

  <!-- base -->
  <rect x="102" y="196" width="56" height="10" rx="2" fill="#e8c54a"/>
  <rect x="90" y="206" width="80" height="6" rx="2" fill="#e8c54a"/>

  <!-- star -->
  <text x="130" y="122" text-anchor="middle" font-size="32" fill="#e8c54a" font-family="serif">★</text>

  <!-- year -->
  <text x="130" y="242" text-anchor="middle" font-size="14" font-weight="500"
        fill="#e8c54a" font-family="sans-serif">2026</text>
</svg>
