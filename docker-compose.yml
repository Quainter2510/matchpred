services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: wc2026
      POSTGRES_PASSWORD: wc2026
      POSTGRES_DB: wc2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc2026"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://wc2026:wc2026@db:5432/wc2026
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      # Persist uploaded avatars across rebuilds.
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Vite bakes these at build time. Override for production domains.
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api/v1}
        VITE_TELEGRAM_BOT: ${VITE_TELEGRAM_BOT:-}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media:
